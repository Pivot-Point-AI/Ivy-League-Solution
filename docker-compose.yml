services:
  app:
    build: .
    image: ivy-league-solutions:latest
    container_name: ivy-league-solutions-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - .env.local

  nginx:
    image: nginx:alpine
    container_name: ivy-league-solutions-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro

volumes:
  certbot-webroot:
